<!DOCTYPE html>

<head>

    <title>Umumiy Tilshunoslik - Test Platformasi</title>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { gray: { 850: '#1f2937', 900: '#111827' } }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .option-btn { transition: all 0.2s ease-in-out; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar-track { background: #f1f1f1; }

    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200">
    
    <header class="w-full bg-white dark:bg-gray-800 shadow-sm py-4 px-6 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-xl font-bold text-blue-600 dark:text-blue-400 uppercase">Umumiy Tilshunoslik</h1>
        <button id="theme-toggle" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-700 text-xl">🌙</button>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-3xl bg-white dark:bg-gray-800 shadow-xl rounded-2xl p-6 md:p-10 border border-gray-100 dark:border-gray-700 relative">
            
            <div id="start-screen" class="text-center animate-fade-in">
                <div class="w-20 h-20 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <h2 class="text-3xl font-extrabold mb-4 uppercase text-gray-800 dark:text-white">INTERAKTIV TEST</h2>
                <p id="total-questions-text" class="text-lg font-medium text-blue-600 mb-8">Savollar yuklanmoqda...</p>
                <button onclick="startQuiz()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-xl shadow-lg transition-all transform hover:-translate-y-1">
                    TESTNI BOSHLASH
                </button>
            </div>

            <div id="quiz-screen" class="hidden animate-fade-in">
                <div class="flex justify-between items-center mb-6 border-b pb-4 dark:border-gray-700">
                    <span id="question-counter" class="bg-blue-100 text-blue-800 py-1 px-4 rounded-full font-bold">1-savol</span>
                    <span id="score-counter" class="text-green-600 font-bold">Ball: 0</span>
                </div>
                <h3 id="question-text" class="text-xl font-semibold mb-8 leading-relaxed whitespace-pre-wrap"></h3>
                <div id="options-container" class="space-y-4 mb-8"></div>
                <div class="flex justify-end pt-4 border-t dark:border-gray-700">
                    <button id="next-btn" onclick="nextQuestion()" disabled class="bg-blue-600 text-white font-bold py-3 px-8 rounded-xl opacity-50 cursor-not-allowed">Keyingisi →</button>
                </div>
            </div>

            <div id="result-screen" class="hidden animate-fade-in text-center">
                <h2 class="text-3xl font-bold mb-6">Natija</h2>
                <div class="bg-blue-50 dark:bg-gray-700 p-8 rounded-3xl mb-8 border-2 border-blue-200">
                    <p id="final-score" class="text-6xl font-black text-blue-600 dark:text-blue-400">0 / 200</p>
                    <p id="percentage-text" class="text-xl mt-2 font-bold text-gray-600 dark:text-gray-300"></p>
                </div>
                <button onclick="location.reload()" class="bg-gray-800 text-white py-3 px-10 rounded-xl mb-6">Qaytadan ishlash</button>
                <div id="mistakes-section" class="mt-8 text-left hidden">
                    <h3 class="text-xl font-bold mb-4 text-red-500">Xatolar ustida ishlash:</h3>
                    <div id="mistakes-container" class="space-y-4 max-h-80 overflow-y-auto pr-2"></div>
                </div>
            </div>

        </div>
    </main>

    </script>

    <script>
        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let mistakes = [];
        let selectedOption = null;

        function initData() {
            const rawText = document.getElementById('raw-quiz-data').textContent;
            
            // 1. Javoblarni kalitdan ajratib olish (1-200 gacha)
            const answersMap = {};
            const keyMatches = rawText.match(/(\d+)-([A-D])/g);
            if (keyMatches) {
                keyMatches.forEach(m => {
                    const [num, letter] = m.split('-');
                    answersMap[parseInt(num)] = letter.trim();
                });
            }

            // 2. Savollarni split qilib olish
            const blocks = rawText.split(/№\s*/).filter(b => b.trim() && !b.includes('KALITI'));
            
            quizData = blocks.map(block => {
                const lines = block.split('\n').filter(l => l.trim());
                const firstLine = lines[0];
                const idMatch = firstLine.match(/^(\d+)\./);
                
                if (!idMatch) return null;

                const id = parseInt(idMatch[1]);
                // Savol matnini № va id dan tozalash
                let text = firstLine.replace(/^\d+\.\s*/, '').trim();

                const options = {};
                const optA = block.match(/A\)\s*(.*)/)?.[1]?.trim();
                const optB = block.match(/B\)\s*(.*)/)?.[1]?.trim();
                const optC = block.match(/C\)\s*(.*)/)?.[1]?.trim();
                const optD = block.match(/D\)\s*(.*)/)?.[1]?.trim();

                if (optA) options.A = optA;
                if (optB) options.B = optB;
                if (optC) options.C = optC;
                if (optD) options.D = optD;

                return {
                    id,
                    text,
                    options,
                    correctAnswer: answersMap[id]
                };
            }).filter(q => q && q.correctAnswer);

            document.getElementById('total-questions-text').innerText = `Bazada ${quizData.length} ta savol tayyor!`;
        }

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            currentQuestionIndex = 0;
            score = 0;
            mistakes = [];
            showQuestion();
        }

        function showQuestion() {
            selectedOption = null;
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.classList.add('opacity-50', 'cursor-not-allowed');

            const q = quizData[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `${currentQuestionIndex + 1} / ${quizData.length}`;
            document.getElementById('question-text').innerText = q.text;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            ['A', 'B', 'C', 'D'].forEach(key => {
                if (q.options[key]) {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 bg-white dark:bg-gray-800 flex items-center";
                    btn.innerHTML = `<span class="font-bold mr-4 text-blue-600">${key})</span> ${q.options[key]}`;
                    btn.onclick = () => selectOption(key, btn);
                    container.appendChild(btn);
                }
            });
            window.scrollTo(0, 0);
        }

        function selectOption(key, btn) {
            if (selectedOption) return;
            selectedOption = key;
            const q = quizData[currentQuestionIndex];
            const isCorrect = key === q.correctAnswer;

            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                const bText = b.innerText.trim();
                const bKey = bText.charAt(0);
                
                if (bKey === q.correctAnswer) {
                    b.classList.add('border-green-500', 'bg-green-50', 'dark:bg-green-900/30');
                } else if (bKey === key) {
                    b.classList.add('border-red-500', 'bg-red-50', 'dark:bg-red-900/30');
                }
                b.classList.add('opacity-50');
            });
            btn.classList.remove('opacity-50');

            if (isCorrect) {
                score++;
            } else {
                mistakes.push({
                    id: q.id,
                    q: q.text,
                    user: key,
                    correct: q.correctAnswer,
                    userVal: q.options[key],
                    correctVal: q.options[q.correctAnswer]
                });
            }

            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('score-counter').innerText = `Ball: ${score}`;
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            const resScreen = document.getElementById('result-screen');
            resScreen.classList.remove('hidden');
            
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
            const percent = Math.round((score / quizData.length) * 100);
            document.getElementById('percentage-text').innerText = `${percent}% o'zlashtirish ko'rsatkichi`;

            if (mistakes.length > 0) {
                document.getElementById('mistakes-section').classList.remove('hidden');
                const cont = document.getElementById('mistakes-container');
                cont.innerHTML = mistakes.map(m => `
                    <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-lg border-l-4 border-red-500 shadow-sm">
                        <p class="font-bold mb-2">№${m.id}. ${m.q}</p>
                        <p class="text-sm text-red-600 font-medium">Sizning javobingiz: ${m.user}) ${m.userVal}</p>
                        <p class="text-sm text-green-600 font-bold">To'g'ri javob: ${m.correct}) ${m.correctVal}</p>
                    </div>
                `).join('');
            }
        }

        document.getElementById('theme-toggle').onclick = () => {
            document.documentElement.classList.toggle('dark');
        };

        window.onload = initData;
    </script>
