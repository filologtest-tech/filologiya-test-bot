**TO'G'RI JAVOBLAR KALITI (101-200)**
101-B, 102-C, 103-A, 104-D, 105-B, 106-C, 107-A, 108-D, 109-B, 110-C, 111-A, 112-D, 113-B, 114-C, 115-A, 116-D, 117-B, 118-C, 119-A, 120-D, 121-B, 122-C, 123-A, 124-D, 125-B, 126-C, 127-A, 128-D, 129-B, 130-C, 131-A, 132-D, 133-B, 134-C, 135-A, 136-D, 137-B, 138-C, 139-A, 140-D, 141-B, 142-C, 143-A, 144-D, 145-B, 146-C, 147-A, 148-D, 149-B, 150-C, 151-A, 152-D, 153-B, 154-C, 155-A, 156-D, 157-B, 158-C, 159-A, 160-D, 161-B, 162-C, 163-A, 164-D, 165-B, 166-C, 167-A, 168-D, 169-B, 170-C, 171-A, 172-D, 173-B, 174-C, 175-A, 176-D, 177-B, 178-C, 179-A, 180-D, 181-B, 182-C, 183-A, 184-D, 185-B, 186-C, 187-A, 188-D, 189-B, 190-C, 191-A, 192-D, 193-B, 194-C, 195-A, 196-D, 197-B, 198-C, 199-A, 200-D.
    </script>

    <script>
        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let mistakes = [];
        let selectedOption = null;

        // Elements
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const questionCounter = document.getElementById('question-counter');
        const scoreCounter = document.getElementById('score-counter');
        const totalQuestionsText = document.getElementById('total-questions-text');
        const finalScoreText = document.getElementById('final-score');
        const mistakesSection = document.getElementById('mistakes-section');
        const mistakesContainer = document.getElementById('mistakes-container');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlTag = document.documentElement;

        // Theme Toggle Logic
        let isDark = false;
        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            if (isDark) {
                htmlTag.classList.add('dark');
                themeIcon.innerText = '☀️';
            } else {
                htmlTag.classList.remove('dark');
                themeIcon.innerText = '🌙';
            }
        });

        // Parse Raw Data
        function initData() {
            const rawText = document.getElementById('raw-quiz-data').textContent;
            const answers = {};
            
            // Extract correct answers
            const answerRegex = /(\d+)\s*-\s*([A-D])/g;
            let match;
            while ((match = answerRegex.exec(rawText)) !== null) {
                answers[parseInt(match[1])] = match[2];
            }

            // Extract questions
            const qRegex = /№\s*(\d+)\.\s*([\s\S]*?)(?=№\s*\d+\.|\*\*TO'G'RI JAVOBLAR KALITI|$)/g;
            while ((match = qRegex.exec(rawText)) !== null) {
                const id = parseInt(match[1]);
                let block = match[2].trim();

                const optA = block.match(/A\)\s*([^\n]*)/);
                const optB = block.match(/B\)\s*([^\n]*)/);
                const optC = block.match(/C\)\s*([^\n]*)/);
                const optD = block.match(/D\)\s*([^\n]*)/);

                if (optA && optB && optC && optD && answers[id]) {
                    const qText = block.substring(0, block.indexOf('A)')).trim();
                    quizData.push({
                        id: id,
                        text: qText,
                        options: {
                            A: optA[1].trim(),
                            B: optB[1].trim(),
                            C: optC[1].trim(),
                            D: optD[1].trim()
                        },
                        correctAnswer: answers[id]
                    });
                }
            }
            
            quizData.sort((a, b) => a.id - b.id);
            totalQuestionsText.innerHTML = `Jami savollar soni: <b class="text-blue-600 dark:text-blue-400">${quizData.length}</b> ta<br><span class="text-sm mt-1 block opacity-75">(A, B, C, D tizimidagi variantlar)</span>`;
        }

        // Initialize parser on load
        initData();

        function startQuiz() {
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            currentQuestionIndex = 0;
            score = 0;
            mistakes = [];
            showQuestion();
        }

        function showQuestion() {
            selectedOption = null;
            nextBtn.disabled = true;
            nextBtn.classList.remove('hover:-translate-y-1', 'shadow-lg');

            const q = quizData[currentQuestionIndex];
            questionCounter.innerText = `Savol ${currentQuestionIndex + 1} / ${quizData.length}`;
            scoreCounter.innerText = `Ball: ${score}`;
            questionText.innerText = q.text;

            optionsContainer.innerHTML = '';
            
            const order = ['A', 'B', 'C', 'D'];
            order.forEach(key => {
                if(q.options[key]) {
                    const value = q.options[key];
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full text-left p-4 md:p-5 rounded-xl border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-400 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 shadow-sm text-base md:text-lg flex items-start group';
                    btn.innerHTML = `<span class="font-bold text-blue-600 dark:text-blue-400 mr-3 mt-0.5 group-hover:scale-110 transition-transform">${key})</span> <span class="flex-1">${value}</span>`;
                    btn.onclick = () => selectOption(key, btn);
                    optionsContainer.appendChild(btn);
                }
            });
        }

        function selectOption(key, btnElement) {
            if (selectedOption) return;
            selectedOption = key;
            const q = quizData[currentQuestionIndex];
            const isCorrect = key === q.correctAnswer;

            const allButtons = optionsContainer.querySelectorAll('button');
            allButtons.forEach(btn => {
                btn.onclick = null;
                btn.classList.remove('hover:border-blue-500', 'dark:hover:border-blue-400', 'cursor-pointer', 'shadow-sm');
                btn.classList.add('cursor-default');

                const isThisBtnCorrect = btn.innerHTML.includes(`${q.correctAnswer})`);

                if (isThisBtnCorrect) {
                    btn.classList.add('bg-green-100', 'border-green-500', 'dark:bg-green-900', 'dark:border-green-500');
                    btn.classList.remove('border-gray-200', 'dark:border-gray-700', 'bg-white', 'dark:bg-gray-800');
                    btn.querySelector('span:first-child').classList.replace('text-blue-600', 'text-green-700');
                    btn.querySelector('span:first-child').classList.replace('dark:text-blue-400', 'dark:text-green-400');
                } else if (btn === btnElement && !isCorrect) {
                    btn.classList.add('bg-red-100', 'border-red-500', 'dark:bg-red-900', 'dark:border-red-500');
                    btn.classList.remove('border-gray-200', 'dark:border-gray-700', 'bg-white', 'dark:bg-gray-800');
                    btn.querySelector('span:first-child').classList.replace('text-blue-600', 'text-red-700');
                    btn.querySelector('span:first-child').classList.replace('dark:text-blue-400', 'dark:text-red-400');
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            if (isCorrect) {
                score++;
                scoreCounter.innerText = `Ball: ${score}`;
            } else {
                mistakes.push({
                    qNum: q.id,
                    question: q.text,
                    userAnswer: `${key}) ${q.options[key]}`,
                    correctAnswer: `${q.correctAnswer}) ${q.options[q.correctAnswer]}`
                });
            }

            nextBtn.disabled = false;
            nextBtn.classList.add('hover:-translate-y-1', 'shadow-lg');
            
            // Auto scroll down smoothly
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function nextQuestion() {
            if (!selectedOption) return;
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            window.scrollTo(0, 0);

            finalScoreText.innerText = `${score} / ${quizData.length}`;

            if (mistakes.length === 0) {
                mistakesSection.classList.add('hidden');
            } else {
                mistakesSection.classList.remove('hidden');
                mistakesContainer.innerHTML = '';
                mistakes.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'p-5 border-l-4 border-red-500 bg-red-50/50 dark:bg-gray-800/80 dark:border-red-500 rounded-r-xl shadow-sm hover:shadow-md transition-shadow';
                    div.innerHTML = `
                        <p class="font-semibold text-lg mb-3 text-gray-900 dark:text-gray-100 leading-relaxed"><span class="text-red-500 dark:text-red-400 mr-2">№${m.qNum}.</span> ${m.question}</p>
                        <div class="space-y-2 bg-white dark:bg-gray-900 p-4 rounded-lg">
                            <p class="text-base text-red-700 dark:text-red-400 flex items-start"><span class="mr-3 font-bold">❌</span> <span>${m.userAnswer}</span></p>
                            <p class="text-base text-green-700 dark:text-green-400 flex items-start"><span class="mr-3 font-bold">✅</span> <span>${m.correctAnswer}</span></p>
                        </div>
                    `;
                    mistakesContainer.appendChild(div);
                });
            }
        }

        function restartQuiz() {
            startQuiz();
            window.scrollTo(0, 0);
        }
    </script>
